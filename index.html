<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WTFridge? - Premium Chef Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
        }
        .font-mono {
            font-family: 'Space Mono', monospace;
        }
    </style>
</head>
<body class="text-neutral-200 min-h-screen selection:bg-amber-500 selection:text-black">

    <!-- ─── HEADER BAR ─── -->
    <header class="border-b border-neutral-900 bg-neutral-950/60 backdrop-blur-md sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <span class="text-xl">🔍</span>
                <h1 class="text-lg font-extrabold tracking-wider text-white uppercase">
                    WT<span class="text-amber-500">Fridge?</span>
                </h1>
            </div>
            <div>
                <span class="font-mono text-[10px] tracking-widest bg-neutral-900 border border-neutral-800 text-neutral-400 px-3 py-1.5 rounded-full uppercase">
                    Grid Engine <span class="text-amber-500 font-bold">V2.5</span>
                </span>
            </div>
        </div>
    </header>

    <!-- ─── MAIN CONTENT CONTAINER ─── -->
    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <!-- SECTION: IMAGE UPLOAD & TRIGGER -->
        <div class="max-w-2xl mx-auto mb-12 text-center">
            
            <!-- Dropzone Area (Fixed image cropping via object-contain) -->
            <div id="dropzone" class="border-2 border-dashed border-neutral-800 hover:border-amber-500/40 rounded-2xl p-6 bg-neutral-950/50 transition-all duration-300 cursor-pointer mb-6 relative overflow-hidden group">
                <input type="file" id="imageInput" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" />
                
                <div id="uploadPrompt" class="space-y-3 py-6">
                    <div class="text-4xl group-hover:scale-110 transition-transform duration-300">📸</div>
                    <p class="text-sm font-medium text-neutral-400">
                        Click or drag your refrigerator photo here
                    </p>
                    <p class="text-[11px] text-neutral-600 font-mono">
                        Supports: JPG, JPEG, PNG
                    </p>
                </div>

                <!-- Preview Box: object-contain prevents cropping completely -->
                <div id="imagePreviewContainer" class="hidden w-full bg-neutral-900/60 rounded-xl overflow-hidden border border-neutral-800 p-2">
                    <img id="imagePreview" src="" alt="Fridge Content Preview" class="w-full max-h-80 object-contain mx-auto rounded-lg">
                </div>
            </div>

            <!-- Action Button -->
            <button id="analyzeBtn" class="w-full py-4 bg-amber-500 hover:bg-amber-400 text-black font-extrabold text-sm rounded-xl tracking-widest uppercase transition-all duration-300 shadow-[0_4px_20px_rgba(245,158,11,0.15)] disabled:opacity-50 disabled:cursor-not-allowed">
                Start AI Chef Analysis
            </button>

            <!-- Loading Spinner State -->
            <div id="loadingState" class="hidden mt-6 space-y-3 text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-amber-500 border-t-transparent"></div>
                <p class="text-xs text-neutral-400 font-mono animate-pulse">
                    🤖 AI Chef is analyzing ingredients and drafting culinary layouts...
                </p>
            </div>
        </div>

        <!-- ─── RECIPE RESULT GRID SYSTEM ─── -->
        <div id="recipeGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-0 translate-y-4 transition-all duration-700">
            <!-- Cards are dynamically injected here -->
        </div>

    </main>

    <!-- ─── JAVASCRIPT FRONTEND ENGINE ─── -->
    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const loadingState = document.getElementById('loadingState');
        const recipeGrid = document.getElementById('recipeGrid');

        let base64ImageString = "";
        let imageMimeType = "";

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                imageMimeType = file.type;
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    base64ImageString = event.target.result.split(',')[1];
                    imagePreview.src = event.target.result;
                    uploadPrompt.classList.add('hidden');
                    imagePreviewContainer.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async () => {
            if (!base64ImageString) {
                alert("Please upload or snapshot your fridge contents first!");
                return;
            }

            analyzeBtn.disabled = true;
            loadingState.classList.remove('hidden');
            recipeGrid.classList.add('opacity-0', 'translate-y-4');

            try {
                // 🎯 Target URL is now securely bound to your Biznet Gio Custom Domain
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image: base64ImageString,
                        mimeType: imageMimeType
                    })
                });

                const data = await response.json();

                if (data.success && Array.isArray(data.recipes)) {
                    renderRecipes(data.recipes);
                } else {
                    alert("Analysis processing failed: " + (data.error || "Unknown structural error"));
                }

            } catch (error) {
                console.error("Fetch Connection Error:", error);
                alert("Connection failed! Please verify your backend server is active on wtfridge.com.");
            } finally {
                analyzeBtn.disabled = false;
                loadingState.classList.add('hidden');
            }
        });

        function renderRecipes(recipes) {
            let gridHTML = "";

            // 🎯 Curated HD Unsplash Images to bypass any broken image bugs
            const foodImages = {
                omelette: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=500&auto=format&fit=crop&q=80",
                stirfry: "https://images.unsplash.com/photo-1512058564366-18510be2db19?w=500&auto=format&fit=crop&q=80",
                pasta: "https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?w=500&auto=format&fit=crop&q=80",
                salad: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&auto=format&fit=crop&q=80",
                soup: "https://images.unsplash.com/photo-1547592165-e1d17fed6005?w=500&auto=format&fit=crop&q=80",
                rice: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=500&auto=format&fit=crop&q=80",
                chicken: "https://images.unsplash.com/photo-1604503468506-a8da13d82791?w=500&auto=format&fit=crop&q=80",
                default: "https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=500&auto=format&fit=crop&q=80"
            };

            recipes.forEach(recipe => {
                const ingredientsList = recipe.ingredients.map(ing => `<li>• ${ing}</li>`).join('');
                const stepsList = recipe.steps.map((step, index) => `<li><span class="text-amber-400 font-mono mr-1">${index + 1}.</span> ${step}</li>`).join('');
                
                const key = (recipe.image_keyword || '').toLowerCase().trim();
                const selectedImageUrl = foodImages[key] || foodImages.default;

                gridHTML += `
                    <div class="bg-neutral-900 border border-neutral-800 rounded-2xl overflow-hidden shadow-[0_4px_30px_rgba(245,158,11,0.02)] hover:border-amber-500/40 hover:shadow-[0_0_30px_rgba(245,158,11,0.08)] transition-all duration-300 flex flex-col justify-between">
                        
                        <div class="w-full h-44 overflow-hidden relative bg-neutral-950 border-b border-neutral-800 flex items-center justify-center">
                            <img src="${selectedImageUrl}" 
                                 alt="${recipe.name}" 
                                 class="w-full h-full object-cover opacity-90 hover:scale-105 transition-transform duration-500 object-center">
                            
                            <div class="absolute top-3 left-3">
                                <span class="text-[9px] bg-neutral-950/80 backdrop-blur-md border border-amber-500/30 text-amber-400 font-mono px-2.5 py-1 rounded-md uppercase tracking-wider block">
                                    ${recipe.cuisine}
                                </span>
                            </div>
                        </div>

                        <div class="p-5 flex flex-col justify-between flex-1">
                            <div>
                                <h4 class="text-base font-bold text-white mb-4 tracking-wide border-b border-neutral-800/60 pb-2 uppercase text-amber-100">
                                    ${recipe.name}
                                </h4>
                                
                                <div class="mb-4 bg-neutral-950/40 p-3 rounded-xl border border-neutral-800/40">
                                    <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest block mb-2 font-mono">Ingredients Required:</span>
                                    <ul class="text-xs text-zinc-300 space-y-1.5 leading-relaxed">
                                        ${ingredientsList}
                                    </ul>
                                </div>
                            </div>
                            
                            <div class="bg-neutral-950/20 p-3 rounded-xl border border-neutral-800/20 mt-2">
                                <span class="text-[10px] text-zinc-500 uppercase font-bold tracking-widest block mb-2 font-mono">Cooking Instructions:</span>
                                <ol class="text-xs text-zinc-400 space-y-2 leading-relaxed">
                                    ${stepsList}
                                </ol>
                            </div>
                        </div>
                    </div>
                `;
            });

            recipeGrid.innerHTML = gridHTML;
            recipeGrid.classList.remove('opacity-0', 'translate-y-4');
        }
    </script>
</body>
</html>
