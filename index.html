<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wtfridge? </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        premiumPink: {
                            50: '#fff6f5',
                            100: '#fbe7e4',
                            200: '#f6d5ce',
                            300: '#efa799',
                            dark: '#4a3e3d',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-image: url('background.jpg');
            background-size: 320px;
            background-repeat: repeat;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #4a3e3d;
        }
        .premium-glass {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .recipe-card {
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .recipe-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(239, 167, 153, 0.3);
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 sm:px-6 lg:px-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="font-serif text-5xl md:text-6xl font-bold tracking-tight text-premiumPink-dark lowercase">
                wtfridge<span class="text-premiumPink-300">?</span>
            </h1>
            <div class="w-12 h-[2px] bg-premiumPink-300 mx-auto mt-4 rounded-full"></div>
        </header>

        <main class="premium-glass rounded-3xl p-6 md:p-8 shadow-xl shadow-premiumPink-dark/5 mb-8">
            <div class="flex flex-col items-center justify-center border-2 border-dashed border-premiumPink-200 rounded-2xl p-8 bg-white/40 text-center cursor-pointer transition-colors hover:bg-white/60 relative" id="dropZone">
                <input type="file" id="fileInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                
                <div class="w-16 h-16 bg-premiumPink-100 rounded-full flex items-center justify-center text-premiumPink-300 mb-4" id="uploadIcon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-8 h-8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0ZM18.75 10.5h.008v.008h-.008V10.5Z" />
                    </svg>
                </div>

                <div id="uploadText">
                    <p class="text-lg font-semibold text-premiumPink-dark">Snapshot Your Fridge</p>
                    <p class="text-xs text-premiumPink-dark/60 mt-1">Drag and drop your image here or click to browse files</p>
                </div>

                <img id="imagePreview" class="hidden max-h-64 rounded-xl shadow-sm border border-white mt-2 object-cover">
            </div>

            <button id="analyzeBtn" disabled class="w-full mt-6 bg-premiumPink-dark text-white font-semibold py-4 px-6 rounded-2xl shadow-lg shadow-premiumPink-dark/20 transition-all hover:bg-premiumPink-dark/90 active:scale-[0.99] disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                <span>Analyze Recipes</span>
            </button>

            <div id="loadingState" class="hidden mt-8 text-center py-6">
                <div class="inline-block w-8 h-8 border-4 border-premiumPink-300 border-t-transparent rounded-full animate-spin mb-3"></div>
                <p class="text-sm font-medium animate-pulse text-premiumPink-dark/80">Gemini is scanning your ingredients...</p>
            </div>

            <div id="errorState" class="hidden mt-6 p-4 bg-red-50 border border-red-200 rounded-2xl text-red-700 text-sm"></div>
        </main>

        <section id="resultsSection" class="hidden space-y-6 mb-12">
            <h2 class="font-serif text-2xl font-bold text-premiumPink-dark px-2">Curated Menu Recommendations</h2>
            <div class="grid gap-6 md:grid-cols-2" id="recipesGrid">
                </div>
        </section>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const imagePreview = document.getElementById('imagePreview');
        const uploadIcon = document.getElementById('uploadIcon');
        const uploadText = document.getElementById('uploadText');
        const loadingState = document.getElementById('loadingState');
        const errorState = document.getElementById('errorState');
        const resultsSection = document.getElementById('resultsSection');
        const recipesGrid = document.getElementById('recipesGrid');

        let base64Image = '';
        let mimeType = '';

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                mimeType = file.type;
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64Image = event.target.result.split(',')[1];
                    
                    imagePreview.src = event.target.result;
                    imagePreview.classList.remove('hidden');
                    uploadIcon.classList.add('hidden');
                    uploadText.classList.add('hidden');
                    analyzeBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        analyzeBtn.addEventListener('click', async function() {
            loadingState.classList.remove('hidden');
            errorState.classList.add('hidden');
            resultsSection.classList.add('hidden');
            analyzeBtn.disabled = true;

            try {
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image, mimeType: mimeType })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'A system error occurred while analyzing the fridge.');
                }

                renderRecipes(data.recipes);

            } catch (err) {
                errorState.innerText = err.message;
                errorState.classList.remove('hidden');
            } finally {
                loadingState.classList.add('hidden');
                analyzeBtn.disabled = false;
            }
        });

        // SMART IMAGE MATCHING ENGINE
        function getRecipeImage(name, keyword) {
            const title = name.toLowerCase();
            const key = keyword.toLowerCase();
            
            // 1. Specific Keyword Matching based on Recipe Title
            if (title.includes('pudding') || title.includes('pading')) {
                return 'https://images.unsplash.com/photo-1511018556340-d16986a1c194?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('milkshake') || title.includes('shake')) {
                return 'https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('smoothie') || title.includes('smoothies')) {
                return 'https://images.unsplash.com/photo-1553530666-ba11a7da3888?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('juice') || title.includes('jus')) {
                return 'https://images.unsplash.com/photo-1600271886742-f049cd451bba?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('omelette') || title.includes('egg')) {
                return 'https://images.unsplash.com/photo-1494597564530-871f2b93ac55?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('pasta') || title.includes('spaghetti')) {
                return 'https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('salad')) {
                return 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('soup') || title.includes('sup')) {
                return 'https://images.unsplash.com/photo-1547592165-e1d17fed6005?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('rice')) {
                return 'https://images.unsplash.com/photo-1603133872878-684f208fb84b?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('chicken')) {
                return 'https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=600&q=80';
            }
            if (title.includes('stirfry') || title.includes('fry') || title.includes('saute')) {
                return 'https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=600&q=80';
            }

            // 2. Macro Category Fallback Engine
            const imageMap = {
                omelette: 'https://images.unsplash.com/photo-1494597564530-871f2b93ac55?auto=format&fit=crop&w=600&q=80',
                stirfry: 'https://images.unsplash.com/photo-1512058564366-18510be2db19?auto=format&fit=crop&w=600&q=80',
                pasta: 'https://images.unsplash.com/photo-1563379091339-03b21ab4a4f8?auto=format&fit=crop&w=600&q=80',
                salad: 'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=600&q=80',
                soup: 'https://images.unsplash.com/photo-1547592165-e1d17fed6005?auto=format&fit=crop&w=600&q=80',
                rice: 'https://images.unsplash.com/photo-1603133872878-684f208fb84b?auto=format&fit=crop&w=600&q=80',
                chicken: 'https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=600&q=80',
                dessert: 'https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=600&q=80',
                drink: 'https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?auto=format&fit=crop&w=600&q=80',
                snack: 'https://images.unsplash.com/photo-1599490659213-e2b9527bb087?auto=format&fit=crop&w=600&q=80'
            };

            return imageMap[key] || imageMap['snack'];
        }

        function renderRecipes(recipes) {
            recipesGrid.innerHTML = '';
            
            // EMPTY FRIDGE FALLBACK STATE
            if (!recipes || recipes.length === 0) {
                recipesGrid.className = 'grid gap-6 grid-cols-1';
                recipesGrid.innerHTML = `
                    <div class="text-center py-12 bg-white/60 rounded-2xl p-8 border border-premiumPink-100 shadow-sm flex flex-col items-center justify-center">
                        <div class="w-12 h-12 bg-premiumPink-100 rounded-full flex items-center justify-center text-premiumPink-300 mb-3">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0 0 12.016 15a4.486 4.486 0 0 0-3.198 1.318M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" />
                            </svg>
                        </div>
                        <h3 class="font-serif text-xl font-bold text-premiumPink-dark mb-1">Your Fridge Looks Empty</h3>
                        <p class="text-sm text-premiumPink-dark/60 max-w-md">Gemini couldn't detect enough viable ingredients to generate recipes. Try restocking your fridge or ensure the photo has clear lighting!</p>
                    </div>
                `;
                resultsSection.classList.remove('hidden');
                resultsSection.scrollIntoView({ behavior: 'smooth' });
                return;
            }

            recipesGrid.className = 'grid gap-6 md:grid-cols-2';
            
            recipes.forEach(recipe => {
                const card = document.createElement('div');
                card.className = 'recipe-card rounded-2xl p-5 border border-premiumPink-100 shadow-sm flex flex-col justify-between overflow-hidden';
                
                const imageUrl = getRecipeImage(recipe.name, recipe.image_keyword);

                const ingredientsHTML = recipe.ingredients.map(ing => 
                    `<li class="flex items-center gap-2 text-sm text-premiumPink-dark/80">
                        <span class="w-1.5 h-1.5 bg-premiumPink-300 rounded-full flex-shrink-0"></span>
                        <span>${ing}</span>
                     </li>`
                ).join('');

                const stepsHTML = recipe.steps.map((step, idx) => 
                    `<div class="flex gap-3 text-sm text-premiumPink-dark/80">
                        <span class="font-serif font-bold text-premiumPink-300">${idx + 1}.</span>
                        <p class="leading-relaxed">${step}</p>
                     </div>`
                ).join('');

                card.innerHTML = `
                    <div>
                        <div class="relative h-44 w-full rounded-xl overflow-hidden mb-4 shadow-sm border border-white/60">
                            <img src="${imageUrl}" alt="${recipe.name}" class="w-full h-full object-cover">
                            <span class="absolute top-3 left-3 bg-white/90 backdrop-blur-md text-premiumPink-dark text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider shadow-sm">
                                ${recipe.cuisine}
                            </span>
                            <span class="absolute top-3 right-3 bg-premiumPink-dark/40 backdrop-blur-md text-white text-[10px] font-medium px-2.5 py-1 rounded-full lowercase italic">
                                #${recipe.image_keyword}
                            </span>
                        </div>

                        <h3 class="font-serif text-xl font-bold text-premiumPink-dark mb-4 leading-tight">
                            ${recipe.name}
                        </h3>
                        
                        <div class="mb-5">
                            <h4 class="text-xs font-bold uppercase tracking-wider text-premiumPink-dark/50 mb-2">Ingredients</h4>
                            <ul class="space-y-1.5">${ingredientsHTML}</ul>
                        </div>
                    </div>
                    
                    <div class="border-t border-dashed border-premiumPink-100 pt-4 mt-2">
                        <h4 class="text-xs font-bold uppercase tracking-wider text-premiumPink-dark/50 mb-3">Cooking Steps</h4>
                        <div class="space-y-3">${stepsHTML}</div>
                    </div>
                `;
                recipesGrid.appendChild(card);
            });

            resultsSection.classList.remove('hidden');
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
